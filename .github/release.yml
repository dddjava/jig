# https://docs.github.com/ja/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: 変更
      labels:
        - '*'
      exclude:
        labels:
          - dependencies
    - title: CI・ワークフロー更新
      labels:
        - github_actions
    - title: ライブラリ更新
      labels:
        - dependencies
