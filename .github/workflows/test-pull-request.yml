name: Main PR Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review # Draftを解除したとき
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Draftでは動作させない
    if: github.event.pull_request.draft == false
    env:
      GRADLE_OPTS: '-Dorg.gradle.daemon=false'
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up JDK
        uses: actions/setup-java@v5.6.0
        with:
          distribution: 'temurin'
          # 25はfixtureを最新LTSのクラスファイルへコンパイルするために使う。21をJAVA_HOMEにする
          java-version: |
            25
            21
      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install JS dependencies
        run: npm ci
      - name: Run JS tests
        run: npm run test
      - name: Run stylelint
        run: npm run lint:css
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew build qualityCheck
      # 生成サイトを入力とするため、Gradle の contractTest より後に実行する
      - name: Run JS contract tests
        run: npm run test:contract:js
      - name: Upload Failure Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-failure-reports
          path: jig-*/build/reports/tests/
          retention-days: 3
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: jig-*/build/reports/jacoco/
          retention-days: 3
