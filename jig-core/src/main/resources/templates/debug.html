<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JIG Debug - Data Viewer</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        header {
            background: #252526;
            padding: 12px 24px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header h1 {
            margin: 0;
            font-size: 16px;
            color: #cccccc;
        }
        header a {
            color: #9cdcfe;
            font-size: 13px;
        }
        #container {
            display: flex;
            height: calc(100vh - 45px);
        }
        #sidebar {
            width: 240px;
            min-width: 240px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            overflow-y: auto;
            padding: 8px 0;
        }
        #sidebar h2 {
            font-size: 11px;
            color: #bbb;
            padding: 8px 16px 4px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .sidebar-item {
            display: block;
            padding: 6px 16px;
            color: #cccccc;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar-item:hover {
            background: #2a2d2e;
        }
        .sidebar-item.active {
            background: #094771;
            color: #ffffff;
        }
        .sidebar-item.missing {
            color: #666;
        }
        #main {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #toolbar {
            background: #2d2d2d;
            padding: 6px 16px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }
        #toolbar span {
            color: #9cdcfe;
        }
        #schema-btn {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #ccc;
            padding: 3px 10px;
            font-size: 12px;
            cursor: pointer;
            font-family: monospace;
        }
        #schema-btn:hover {
            background: #4a4a4a;
        }
        #schema-btn.active {
            background: #094771;
            color: #ffffff;
            border-color: #0e639c;
        }
        #schema-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }
        #json-view {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }
        #json-view pre {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .json-key    { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-bool   { color: #569cd6; }
        .json-null   { color: #569cd6; }
        .json-collapsible { position: relative; }
        .json-inner { display: inline; }
        .json-collapsed-marker {
            display: none;
            color: #858585;
            background: #333;
            border-radius: 3px;
            padding: 0 4px;
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
        }
        .collapsed > .json-inner { display: none; }
        .collapsed > .json-collapsed-marker { display: inline; }
        .line-number {
            display: inline-block;
            min-width: 3ch;
            text-align: right;
            padding-right: 12px;
            user-select: none;
            color: #555;
            margin-right: 0;
        }
        .line-number.foldable {
            cursor: pointer;
            color: #858585;
        }
        .line-number.foldable::before {
            content: '›';
            font-size: 1em;
            opacity: 0.5;
            margin-right: 4px;
        }
        .line-number.foldable:hover {
            color: #ccc;
            background: #2a2a2a;
            border-radius: 2px;
        }
        #empty-msg {
            color: #666;
            padding: 32px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>JIG Debug</h1>
</header>
<div id="container">
    <nav id="sidebar">
        <h2>データファイル</h2>
        <div id="sidebar-items">読み込み中...</div>
    </nav>
    <div id="main">
        <div id="toolbar">
            <span id="current-file">-</span>
            <button id="schema-btn" disabled>Schema</button>
        </div>
        <div id="json-view">
            <div id="empty-msg">左のリストからファイルを選択してください。</div>
        </div>
    </div>
</div>

<script>
const DATA_FILES = [
    { file: "data/glossary-data.js",        varName: "glossaryData" },
    { file: "data/package-data.js",         varName: "packageData" },
    { file: "data/domain-data.js",          varName: "domainData" },
    { file: "data/usecase-data.js",         varName: "usecaseData" },
    { file: "data/inbound-data.js",         varName: "inboundData" },
    { file: "data/outbound-data.js",        varName: "outboundData" },
    { file: "data/insight-data.js",         varName: "insightData" },
    { file: "data/list-output-data.js",     varName: "listData" },
    { file: "data/navigation-data.js",      varName: "navigationData" },
    { file: "data/type-relations-data.js",  varName: "typeRelationsData" },
];
const TEXT_FILES = [
    { file: "data/metrics-data.js", varName: "metricsData", label: "jig-metrics" },
];

let currentEntry = null;
let currentEntryType = null; // 'json' | 'text'

function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src + "?_=" + Date.now();
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

function syntaxHighlight(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\{\}|\[\]|[\{\}\[\]])/g, match => {
            if (match === '{}' || match === '[]') return match;
            if (match === '{' || match === '[') {
                return `<span class="json-collapsible">${match}<span class="json-inner">`;
            }
            if (match === '}' || match === ']') {
                return `</span><span class="json-collapsed-marker">...</span>${match}</span>`;
            }
            let cls = "json-number";
            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? "json-key" : "json-string";
            } else if (/true|false/.test(match)) {
                cls = "json-bool";
            } else if (/null/.test(match)) {
                cls = "json-null";
            }
            return `<span class="${cls}">${match}</span>`;
        });
}

function addLineNumbers(html) {
    const lines = html.split('\n');
    let collapsibleId = 0;

    return lines.map((line, i) => {
        const lineNum = i + 1;
        const isFoldable = line.includes('json-collapsible') &&
                           !line.includes('json-collapsed-marker');
        const gutterClass = isFoldable ? 'line-number foldable' : 'line-number';

        let lineHtml = line;
        let foldAttr = '';
        if (isFoldable) {
            collapsibleId++;
            lineHtml = line.replace(/class="json-collapsible"/g, `class="json-collapsible" data-fold-id="${collapsibleId}"`);
            foldAttr = ` data-fold-target="${collapsibleId}"`;
        }

        return `<span class="${gutterClass}" data-line="${lineNum}"${foldAttr}>${lineNum}</span>${lineHtml}`;
    }).join('\n');
}

function addLineNumbersText(text) {
    const lines = text.split('\n');
    const escaped = lines.map(line => line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"));
    return escaped.map((line, i) => {
        const lineNum = i + 1;
        return `<span class="line-number" data-line="${lineNum}">${lineNum}</span>${line}`;
    }).join('\n');
}

function showJson(entry) {
    currentEntry = entry;
    currentEntryType = 'json';
    const data = globalThis[entry.varName];
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.file;

    const formatted = JSON.stringify(data, null, 2);
    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbers(syntaxHighlight(formatted));
    view.innerHTML = "";
    view.scrollTop = 0;
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    const schemaBtn = document.getElementById("schema-btn");
    schemaBtn.disabled = false;
    schemaBtn.classList.remove("active");
}

function showText(entry) {
    currentEntry = entry;
    currentEntryType = 'text';
    const text = globalThis[entry.varName];
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.label;

    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbersText(text);
    view.innerHTML = "";
    view.scrollTop = 0;
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    const schemaBtn = document.getElementById("schema-btn");
    schemaBtn.disabled = true;
    schemaBtn.classList.remove("active");
}

// ---- スキーマ推測エンジン ----
function inferSchema(data) {
    if (data === null) return "null";
    if (Array.isArray(data)) {
        if (data.length === 0) return { type: "array", items: "unknown" };
        const merged = data.map(inferSchema).reduce(mergeSchemas);
        return { type: "array", items: merged };
    }
    if (typeof data === "object") {
        const properties = {};
        for (const key of Object.keys(data)) {
            properties[key] = inferSchema(data[key]);
        }
        return { type: "object", properties };
    }
    return typeof data;
}

function mergeSchemas(a, b) {
    if (JSON.stringify(a) === JSON.stringify(b)) return a;
    if (typeof a === "string" && typeof b === "string") {
        // どちらもプリミティブ型文字列だが種類が異なる
        return "any";
    }
    if (typeof a === "object" && typeof b === "object" && a !== null && b !== null) {
        if (a.type === "object" && b.type === "object") {
            const allKeys = new Set([...Object.keys(a.properties), ...Object.keys(b.properties)]);
            const properties = {};
            for (const key of allKeys) {
                if (key in a.properties && key in b.properties) {
                    properties[key] = mergeSchemas(a.properties[key], b.properties[key]);
                } else {
                    properties[key] = key in a.properties ? a.properties[key] : b.properties[key];
                }
            }
            return { type: "object", properties };
        }
        if (a.type === "array" && b.type === "array") {
            return { type: "array", items: mergeSchemas(a.items, b.items) };
        }
    }
    return "any";
}

function showSchema(entry) {
    const data = globalThis[entry.varName];
    const schema = inferSchema(data);
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.file + " [schema]";

    currentEntry = entry;
    currentEntryType = 'schema';

    const formatted = JSON.stringify(schema, null, 2);
    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbers(syntaxHighlight(formatted));
    view.innerHTML = "";
    view.scrollTop = 0;
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    document.getElementById("schema-btn").classList.add("active");
}
// ---- /スキーマ推測エンジン ----

async function init() {
    const sidebarItems = document.getElementById("sidebar-items");
    sidebarItems.innerHTML = "";

    let firstLoaded = null;

    for (const entry of DATA_FILES) {
        const btn = document.createElement("button");
        btn.className = "sidebar-item";
        btn.textContent = entry.file.replace("data/", "").replace("-data.js", "");
        btn.dataset.file = entry.file;

        try {
            await loadScript(entry.file);
            if (globalThis[entry.varName] !== undefined) {
                btn.addEventListener("click", () => showJson(entry));
                if (!firstLoaded) firstLoaded = { entry, show: () => showJson(entry), type: 'json' };
            } else {
                btn.classList.add("missing");
                btn.title = "データなし";
            }
        } catch (_) {
            btn.classList.add("missing");
            btn.title = "ファイルなし";
        }

        sidebarItems.appendChild(btn);
    }

    const metricsHeader = document.createElement("h2");
    metricsHeader.textContent = "メトリクス";
    sidebarItems.appendChild(metricsHeader);

    for (const entry of TEXT_FILES) {
        const btn = document.createElement("button");
        btn.className = "sidebar-item";
        btn.textContent = entry.label;
        btn.dataset.file = entry.file;

        try {
            await loadScript(entry.file);
            if (globalThis[entry.varName] !== undefined) {
                btn.addEventListener("click", () => showText(entry));
                if (!firstLoaded) firstLoaded = { entry, show: () => showText(entry) };
            } else {
                btn.classList.add("missing");
                btn.title = "データなし";
            }
        } catch (_) {
            btn.classList.add("missing");
            btn.title = "ファイルなし";
        }

        sidebarItems.appendChild(btn);
    }

    if (firstLoaded) {
        firstLoaded.show();
        if (firstLoaded.type === 'json') {
            document.getElementById("schema-btn").disabled = false;
        }
    } else {
        document.getElementById("empty-msg").textContent = "data/*-data.js が見つかりませんでした。JIGを実行してからアクセスしてください。";
    }

    document.getElementById("schema-btn").addEventListener("click", () => {
        if (currentEntryType === 'schema') {
            showJson(currentEntry);
        } else if (currentEntry && currentEntryType === 'json') {
            showSchema(currentEntry);
        }
    });

    document.getElementById("json-view").addEventListener("click", e => {
        if (e.target.classList.contains("json-toggle") || e.target.classList.contains("json-collapsed-marker")) {
            e.target.closest(".json-collapsible").classList.toggle("collapsed");
        } else if (e.target.classList.contains("foldable")) {
            const foldId = e.target.dataset.foldTarget;
            const pre = e.target.closest("pre");
            if (pre && foldId) {
                const collapsible = pre.querySelector(`[data-fold-id="${foldId}"]`);
                if (collapsible) collapsible.classList.toggle("collapsed");
            }
        }
    });
}

init();
</script>
</body>
</html>
