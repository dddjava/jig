<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JIG Debug - Data Viewer</title>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        header {
            background: #252526;
            padding: 12px 24px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header h1 {
            margin: 0;
            font-size: 16px;
            color: #cccccc;
        }
        header a {
            color: #9cdcfe;
            font-size: 13px;
        }
        #container {
            display: flex;
            height: calc(100vh - 45px);
        }
        #sidebar {
            width: 240px;
            min-width: 240px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            overflow-y: auto;
            padding: 8px 0;
        }
        #sidebar h2 {
            font-size: 11px;
            color: #bbb;
            padding: 8px 16px 4px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .sidebar-item {
            display: block;
            padding: 6px 16px;
            color: #cccccc;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar-item:hover {
            background: #2a2d2e;
        }
        .sidebar-item.active {
            background: #094771;
            color: #ffffff;
        }
        .sidebar-item.missing {
            color: #666;
        }
        #main {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #toolbar {
            background: #2d2d2d;
            padding: 6px 16px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }
        #toolbar span {
            color: #9cdcfe;
        }
        #search-box {
            margin-left: auto;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #ccc;
            padding: 3px 8px;
            font-size: 12px;
            width: 200px;
        }
        #schema-btn {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #ccc;
            padding: 3px 10px;
            font-size: 12px;
            cursor: pointer;
            font-family: monospace;
        }
        #schema-btn:hover {
            background: #4a4a4a;
        }
        #schema-btn.active {
            background: #094771;
            color: #ffffff;
            border-color: #0e639c;
        }
        #schema-btn:disabled {
            opacity: 0.35;
            cursor: default;
        }
        #json-view {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }
        #json-view pre {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .json-key    { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-bool   { color: #569cd6; }
        .json-null   { color: #569cd6; }
        .json-toggle {
            cursor: pointer;
            color: #858585;
            display: inline-block;
            width: 1.5ch;
            text-align: center;
            transition: transform 0.1s;
            user-select: none;
        }
        .json-toggle:hover { color: #ccc; }
        .json-collapsible { position: relative; }
        .json-inner { display: inline; }
        .json-collapsed-marker {
            display: none;
            color: #858585;
            background: #333;
            border-radius: 3px;
            padding: 0 4px;
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
        }
        .collapsed > .json-inner { display: none; }
        .collapsed > .json-collapsed-marker { display: inline; }
        .collapsed > .json-toggle { transform: rotate(-90deg); }
        .highlight { background: #613315; }
        .line {
            display: flex;
            min-height: 1.5em;
        }
        .line-gutter {
            min-width: 3ch;
            text-align: right;
            color: #555;
            padding-right: 12px;
            user-select: none;
            flex-shrink: 0;
        }
        .line-gutter.foldable {
            cursor: pointer;
            color: #858585;
        }
        .line-gutter.foldable:hover {
            color: #ccc;
            background: #2a2a2a;
        }
        .line-content { flex: 1; }
        #empty-msg {
            color: #666;
            padding: 32px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<header>
    <h1>JIG Debug</h1>
</header>
<div id="container">
    <nav id="sidebar">
        <h2>データファイル</h2>
        <div id="sidebar-items">読み込み中...</div>
    </nav>
    <div id="main">
        <div id="toolbar">
            <span id="current-file">-</span>
            <button id="schema-btn" disabled>Schema</button>
            <input id="search-box" type="text" placeholder="キーワード検索 または .path[0].field | .[]">
        </div>
        <div id="json-view">
            <div id="empty-msg">左のリストからファイルを選択してください。</div>
        </div>
    </div>
</div>

<script>
const DATA_FILES = [
    { file: "data/glossary-data.js",     varName: "glossaryData" },
    { file: "data/package-data.js",      varName: "packageData" },
    { file: "data/domain-data.js",      varName: "domainData" },
    { file: "data/usecase-data.js",      varName: "usecaseData" },
    { file: "data/inbound-data.js",   varName: "inboundData" },
    { file: "data/outbound-data.js",      varName: "outboundData" },
    { file: "data/insight-data.js",      varName: "insightData" },
    { file: "data/list-output-data.js",  varName: "listData" },
];
const TEXT_FILES = [
    { file: "data/metrics-data.js", varName: "metricsData", label: "jig-metrics" },
];

let currentEntry = null;
let currentEntryType = null; // 'json' | 'text'

function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src + "?_=" + Date.now();
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
}

function syntaxHighlight(json) {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
    return json
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\{\}|\[\]|[\{\}\[\]])/g, match => {
            if (match === '{}' || match === '[]') return match;
            if (match === '{' || match === '[') {
                return `<span class="json-collapsible"><span class="json-toggle">▼</span>${match}<span class="json-inner">`;
            }
            if (match === '}' || match === ']') {
                return `</span><span class="json-collapsed-marker">...</span>${match}</span>`;
            }
            let cls = "json-number";
            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? "json-key" : "json-string";
            } else if (/true|false/.test(match)) {
                cls = "json-bool";
            } else if (/null/.test(match)) {
                cls = "json-null";
            }
            return `<span class="${cls}">${match}</span>`;
        });
}

function addLineNumbers(html) {
    const lines = html.split('\n');
    let lineNum = 1;
    let result = `<div class="line"><span class="line-gutter">1</span><span class="line-content">`;

    for (let i = 0; i < lines.length; i++) {
        result += lines[i];
        if (i < lines.length - 1) {
            lineNum++;
            const isFoldable = lines[i].includes('json-collapsible') &&
                               !lines[i].includes('json-collapsed-marker');
            const gutterClass = isFoldable ? 'line-gutter foldable' : 'line-gutter';
            result += `</span></div>\n<div class="line"><span class="${gutterClass}">${lineNum}</span><span class="line-content">`;
        }
    }

    result += `</span></div>`;
    return result;
}

function addLineNumbersText(text) {
    const lines = text.split('\n');
    const escaped = lines.map(line => line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")).join('\n');
    const htmlLines = escaped.split('\n');
    return htmlLines.map((line, i) => {
        const lineNum = i + 1;
        return `<div class="line"><span class="line-gutter">${lineNum}</span><span class="line-content">${line}</span></div>`;
    }).join('');
}

function showJson(entry) {
    currentEntry = entry;
    currentEntryType = 'json';
    const data = globalThis[entry.varName];
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.file;
    document.getElementById("search-box").value = "";

    const formatted = JSON.stringify(data, null, 2);
    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbers(syntaxHighlight(formatted));
    view.innerHTML = "";
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    const schemaBtn = document.getElementById("schema-btn");
    schemaBtn.disabled = false;
    schemaBtn.classList.remove("active");
}

function showText(entry) {
    currentEntry = entry;
    currentEntryType = 'text';
    const text = globalThis[entry.varName];
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.label;
    document.getElementById("search-box").value = "";

    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbersText(text);
    view.innerHTML = "";
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    const schemaBtn = document.getElementById("schema-btn");
    schemaBtn.disabled = true;
    schemaBtn.classList.remove("active");
}

// ---- スキーマ推測エンジン ----
function inferSchema(data) {
    if (data === null) return "null";
    if (Array.isArray(data)) {
        if (data.length === 0) return { type: "array", items: "unknown" };
        const merged = data.map(inferSchema).reduce(mergeSchemas);
        return { type: "array", items: merged };
    }
    if (typeof data === "object") {
        const properties = {};
        for (const key of Object.keys(data)) {
            properties[key] = inferSchema(data[key]);
        }
        return { type: "object", properties };
    }
    return typeof data;
}

function mergeSchemas(a, b) {
    if (JSON.stringify(a) === JSON.stringify(b)) return a;
    if (typeof a === "string" && typeof b === "string") {
        // どちらもプリミティブ型文字列だが種類が異なる
        return "any";
    }
    if (typeof a === "object" && typeof b === "object" && a !== null && b !== null) {
        if (a.type === "object" && b.type === "object") {
            const allKeys = new Set([...Object.keys(a.properties), ...Object.keys(b.properties)]);
            const properties = {};
            for (const key of allKeys) {
                if (key in a.properties && key in b.properties) {
                    properties[key] = mergeSchemas(a.properties[key], b.properties[key]);
                } else {
                    properties[key] = key in a.properties ? a.properties[key] : b.properties[key];
                }
            }
            return { type: "object", properties };
        }
        if (a.type === "array" && b.type === "array") {
            return { type: "array", items: mergeSchemas(a.items, b.items) };
        }
    }
    return "any";
}

function showSchema(entry) {
    const data = globalThis[entry.varName];
    const schema = inferSchema(data);
    const view = document.getElementById("json-view");
    document.getElementById("current-file").textContent = entry.file + " [schema]";
    document.getElementById("search-box").value = "";

    currentEntry = entry;
    currentEntryType = 'schema';

    const formatted = JSON.stringify(schema, null, 2);
    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbers(syntaxHighlight(formatted));
    view.innerHTML = "";
    view.appendChild(pre);

    document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
    document.querySelector(`[data-file="${entry.file}"]`).classList.add("active");
    document.getElementById("schema-btn").classList.add("active");
}
// ---- /スキーマ推測エンジン ----

// ---- jq サブセットエンジン ----
// サポート: . | .field | .[n] | .[] | パイプ |
function tokenizeJqPath(path) {
    const tokens = [];
    let i = 0;
    while (i < path.length) {
        if (path[i] === '.') {
            i++;
        } else if (path[i] === '[') {
            const close = path.indexOf(']', i);
            if (close === -1) throw new Error("']' が閉じていません");
            const inner = path.slice(i + 1, close).trim();
            if (inner === '' || inner === '*') {
                tokens.push({ type: 'iter' });
            } else if (/^-?\d+$/.test(inner)) {
                tokens.push({ type: 'index', n: parseInt(inner, 10) });
            } else {
                throw new Error(`不明なインデックス: [${inner}]`);
            }
            i = close + 1;
        } else {
            let j = i;
            while (j < path.length && path[j] !== '.' && path[j] !== '[') j++;
            if (j > i) tokens.push({ type: 'field', name: path.slice(i, j) });
            i = j;
        }
    }
    return tokens;
}

function applyToken(token, data) {
    if (data === null || data === undefined) return [];
    switch (token.type) {
        case 'field':
            if (typeof data === 'object' && !Array.isArray(data)) {
                return token.name in data ? [data[token.name]] : [];
            }
            return [];
        case 'index': {
            if (Array.isArray(data)) {
                const idx = token.n < 0 ? data.length + token.n : token.n;
                return idx in data ? [data[idx]] : [];
            }
            return [];
        }
        case 'iter':
            if (Array.isArray(data)) return [...data];
            if (typeof data === 'object') return Object.values(data);
            return [];
    }
    return [];
}

function evalJq(expr, data) {
    const parts = expr.split('|').map(s => s.trim());
    let current = [data];
    for (const part of parts) {
        if (!part.startsWith('.')) throw new Error(`'.' で始まる式のみサポートします: ${part}`);
        const path = part.slice(1);
        const next = [];
        for (const item of current) {
            if (path === '') {
                next.push(item);
            } else {
                const tokens = tokenizeJqPath(path);
                let items = [item];
                for (const token of tokens) {
                    items = items.flatMap(i => applyToken(token, i));
                }
                next.push(...items);
            }
        }
        current = next;
    }
    return current;
}

function applyJq(expr) {
    if (!currentEntry) return;
    const data = globalThis[currentEntry.varName];
    const view = document.getElementById("json-view");
    let results;
    try {
        results = evalJq(expr, data);
    } catch (e) {
        view.innerHTML = `<div style="color:#f44747;padding:8px;font-size:13px">エラー: ${e.message}</div>`;
        return;
    }
    const formatted = results.map(r => JSON.stringify(r, null, 2)).join('\n');
    const pre = document.createElement("pre");
    pre.innerHTML = addLineNumbers(syntaxHighlight(formatted));
    view.innerHTML = "";
    view.appendChild(pre);
}
// ---- /jq サブセットエンジン ----

function applySearch(keyword) {
    const re = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
    const view = document.getElementById("json-view");
    const pre = document.createElement("pre");

    if (currentEntryType === 'text') {
        const text = globalThis[currentEntry.varName];
        const escaped = text
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const highlighted = escaped.replace(re, m => `<mark class="highlight">${m}</mark>`);
        pre.innerHTML = addLineNumbersText(highlighted);
    } else {
        const data = globalThis[currentEntry.varName];
        const formatted = JSON.stringify(data, null, 2);
        const html = syntaxHighlight(formatted);
        const parts = html.split(/(<[^>]*>)/);
        const highlightedParts = parts.map(part => {
            if (part.startsWith('<')) return part;
            return part.replace(re, m => `<mark class="highlight">${m}</mark>`);
        });
        pre.innerHTML = addLineNumbers(highlightedParts.join(''));
    }

    view.innerHTML = "";
    view.appendChild(pre);
}

function applyFilter(keyword) {
    if (!currentEntry) return;
    if (!keyword) {
        if (currentEntryType === 'json' || currentEntryType === 'schema') showJson(currentEntry);
        else showText(currentEntry);
        return;
    }
    if (currentEntryType === 'json' && keyword.startsWith('.')) {
        applyJq(keyword);
    } else {
        applySearch(keyword);
    }
}

async function init() {
    const sidebarItems = document.getElementById("sidebar-items");
    sidebarItems.innerHTML = "";

    let firstLoaded = null;

    for (const entry of DATA_FILES) {
        const btn = document.createElement("button");
        btn.className = "sidebar-item";
        btn.textContent = entry.file.replace("data/", "").replace("-data.js", "");
        btn.dataset.file = entry.file;

        try {
            await loadScript(entry.file);
            if (globalThis[entry.varName] !== undefined) {
                btn.addEventListener("click", () => showJson(entry));
                if (!firstLoaded) firstLoaded = { entry, show: () => showJson(entry), type: 'json' };
            } else {
                btn.classList.add("missing");
                btn.title = "データなし";
            }
        } catch (_) {
            btn.classList.add("missing");
            btn.title = "ファイルなし";
        }

        sidebarItems.appendChild(btn);
    }

    const metricsHeader = document.createElement("h2");
    metricsHeader.textContent = "メトリクス";
    sidebarItems.appendChild(metricsHeader);

    for (const entry of TEXT_FILES) {
        const btn = document.createElement("button");
        btn.className = "sidebar-item";
        btn.textContent = entry.label;
        btn.dataset.file = entry.file;

        try {
            await loadScript(entry.file);
            if (globalThis[entry.varName] !== undefined) {
                btn.addEventListener("click", () => showText(entry));
                if (!firstLoaded) firstLoaded = { entry, show: () => showText(entry) };
            } else {
                btn.classList.add("missing");
                btn.title = "データなし";
            }
        } catch (_) {
            btn.classList.add("missing");
            btn.title = "ファイルなし";
        }

        sidebarItems.appendChild(btn);
    }

    if (firstLoaded) {
        firstLoaded.show();
        if (firstLoaded.type === 'json') {
            document.getElementById("schema-btn").disabled = false;
        }
    } else {
        document.getElementById("empty-msg").textContent = "data/*-data.js が見つかりませんでした。JIGを実行してからアクセスしてください。";
    }

    document.getElementById("search-box").addEventListener("input", e => {
        applyFilter(e.target.value.trim());
    });

    document.getElementById("schema-btn").addEventListener("click", () => {
        if (currentEntryType === 'schema') {
            showJson(currentEntry);
        } else if (currentEntry && currentEntryType === 'json') {
            showSchema(currentEntry);
        }
    });

    document.getElementById("json-view").addEventListener("click", e => {
        if (e.target.classList.contains("json-toggle") || e.target.classList.contains("json-collapsed-marker")) {
            e.target.closest(".json-collapsible").classList.toggle("collapsed");
        } else if (e.target.classList.contains("foldable")) {
            const collapsible = e.target.closest(".line")?.querySelector(".json-collapsible");
            if (collapsible) collapsible.classList.toggle("collapsed");
        }
    });
}

init();
</script>
</body>
</html>
