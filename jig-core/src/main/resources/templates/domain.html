<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css?v={{assetVersion}}" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico?v={{assetVersion}}">
    <title data-i18n>ドメインモデル</title>
</head>
<body class="domain-model">
<header class="top">
    <a href="./index.html">JIG</a> / <b class="jig-page-title" data-i18n>ドメインモデル</b>
</header>
<div class="split-view">
    <nav id="domain-sidebar" class="in-page-sidebar in-page-sidebar--tree">
        <div class="sidebar-header">
        <details id="sidebar-settings" class="sidebar-settings">
            <summary>
                <span data-i18n>表示設定</span>
            </summary>
            <div class="sidebar-settings-panel">
                <fieldset>
                    <legend data-i18n>種類</legend>
                    <label data-i18n><input type="radio" name="kind-filter" value="all" checked> すべて</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="パッケージ"> パッケージ</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="文字列"> 文字列</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="数値"> 数値</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="日付"> 日付</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="期間"> 期間</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="区分"> 区分</label>
                    <label data-i18n><input type="radio" name="kind-filter" value="コレクション"> コレクション</label>
                </fieldset>
                <fieldset>
                    <legend data-i18n>表示内容</legend>
                    <label data-i18n>
                        <input type="checkbox" id="show-descriptions" checked>
                        説明
                    </label>
                    <label data-i18n>
                        <input type="checkbox" id="show-members" checked>
                        メンバ
                    </label>
                </fieldset>
                <fieldset>
                    <legend data-i18n>ダイアグラム</legend>
                    <label data-i18n>
                        <input type="checkbox" id="show-diagrams" checked>
                        ダイアグラム表示
                    </label>
<label data-i18n>
                        <input type="checkbox" id="show-deprecated-nodes" checked>
                        Deprecated ノード
                    </label>
                    <label data-i18n>
                        <input type="checkbox" id="transitive-reduction-toggle" checked>
                        依存関係の簡略表示
                    </label>
                </fieldset>
            </div>
        </details>
        <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" aria-expanded="true" title="サイドバーを折りたたむ/展開する"></button>
        </div>
        <div class="sidebar-filter">
            <input type="search" id="domain-sidebar-filter" placeholder="絞り込み" data-i18n-attr="placeholder" autocomplete="off">
        </div>
        <div id="domain-sidebar-list" class="in-page-sidebar__list"></div>
    </nav>
    <main id="domain-main" class="jig-card-list">
        <div id="jig-document-description" class="hidden"></div>
        <!-- JavaScriptで描画されます -->
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig-bundle.js?v={{assetVersion}}"></script>
<script src="./data/navigation-data.js?v={{assetVersion}}"></script>
<script src="./data/summary-data.js?v={{assetVersion}}"></script>
<script src="./data/type-relations-data.js?v={{assetVersion}}"></script>
<script src="./data/domain-data.js?v={{assetVersion}}"></script>
<script src="./data/glossary-data.js?v={{assetVersion}}"></script>
<script src="./assets/domain.js?v={{assetVersion}}"></script>
</body>
</html>
