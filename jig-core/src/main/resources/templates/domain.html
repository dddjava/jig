<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>ドメイン概要</title>
</head>
<body class="domain-summary">
<header class="top">
    <a href="./index.html">JIG</a> / <b>ドメイン概要</b>
</header>
<div class="split-view">
    <nav id="domain-sidebar" class="tree in-page-sidebar in-page-sidebar--tree" aria-label="パッケージツリー">
        <details id="domain-settings" class="domain-settings">
            <summary>&#x2699; 表示設定</summary>
            <div class="domain-settings-panel">
                <div class="settings-row">
                    <button type="button" id="direction-toggle" class="direction-toggle" title="ダイアグラム方向を切り替え">
                        <svg class="direction-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- 初期: 縦方向 -->
                            <g class="vertical-arrows">
                                <path d="M12 5v14"/>
                                <path d="M12 5l-3 3"/>
                                <path d="M12 5l3 3"/>
                                <path d="M12 19l-3-3"/>
                                <path d="M12 19l3-3"/>
                            </g>
                            <!-- 横方向（display:none） -->
                            <g class="horizontal-arrows" style="display:none">
                                <path d="M5 12h14"/>
                                <path d="M19 12l-3-3"/>
                                <path d="M19 12l-3 3"/>
                                <path d="M5 12l3-3"/>
                                <path d="M5 12l3 3"/>
                            </g>
                        </svg>
                    </button>
                </div>
                <div class="settings-row">
                    <label>
                        <input type="checkbox" id="show-external-relations" checked>
                        外部パッケージへの関連
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input type="checkbox" id="show-deprecated-nodes" checked>
                        Deprecated ノード
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input type="checkbox" id="show-fields" checked>
                        フィールド
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input type="checkbox" id="show-methods" checked>
                        メソッド
                    </label>
                </div>
                <div class="settings-row">
                    <label>
                        <input type="checkbox" id="show-static-methods" checked>
                        staticメソッド
                    </label>
                </div>
            </div>
        </details>
        <div id="domain-sidebar-list" class="in-page-sidebar__list"></div>
    </nav>
    <main id="domain-main" class="jig-card-list">
        <!-- JavaScriptで描画されます -->
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig.js"></script>
<script src="./data/navigation-data.js"></script>
<script src="./data/domain-data.js"></script>
<script src="./data/glossary-data.js"></script>
<script src="./assets/domain.js"></script>
</body>
</html>
