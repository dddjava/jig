<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css?v={{assetVersion}}" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico?v={{assetVersion}}">
    <title data-i18n>用語集</title>
</head>
<body class="glossary">
<header class="top">
    <a href="./index.html">JIG</a> / <b class="jig-page-title" data-i18n>用語集</b>
</header>
<div class="split-view">
    <nav id="term-sidebar" class="in-page-sidebar in-page-sidebar--tree">
        <div class="sidebar-header">
        <details id="sidebar-settings" class="sidebar-settings">
            <summary>
                <span data-i18n>表示設定</span>
            </summary>
            <div class="sidebar-settings-panel">
                <fieldset class="misc-option">
                    <legend data-i18n>表示対象</legend>
                    <label data-i18n>
                        <input id="show-only-domain" type="checkbox" checked>
                        ドメインのみ
                    </label>
                    <label data-i18n>
                        <input id="show-empty-description" type="checkbox" checked>
                        説明のない用語
                    </label>
                </fieldset>
                <fieldset class="kind-option checkbox-options">
                    <legend class="kind-option-title" data-i18n>種類</legend>
                    <label><input type="checkbox" id="show-package" checked><span class="kind-badge" data-kind="パッケージ">P</span><span data-i18n>パッケージ</span></label>
                    <label><input type="checkbox" id="show-class" checked><span class="kind-badge" data-kind="クラス">C</span><span data-i18n>クラス</span></label>
                    <label><input type="checkbox" id="show-method"><span class="kind-badge" data-kind="メソッド">M</span><span data-i18n>メソッド</span></label>
                    <label><input type="checkbox" id="show-field"><span class="kind-badge" data-kind="フィールド">F</span><span data-i18n>フィールド</span></label>
                </fieldset>
                <div class="display-option">
                    <div class="display-controls-row">
                        <div class="sorting-controls">
                            <label data-i18n>
                                <input type="checkbox" id="show-attributes">
                                属性情報を表示する
                            </label>
                        </div>
                        <button id="export-csv" type="button" data-i18n>CSV出力</button>
                    </div>
                </div>
            </div>
        </details>
        <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" aria-expanded="true" title="サイドバーを折りたたむ/展開する"></button>
        </div>
        <div class="sidebar-filter">
            <input type="search" id="glossary-sidebar-filter" placeholder="絞り込み" data-i18n-attr="placeholder" autocomplete="off">
        </div>
        <div id="term-sidebar-list" class="in-page-sidebar__list"></div>
    </nav>
    <main id="glossary-main">
        <div id="jig-document-description" class="hidden"></div>
        <div id="jump-bar" class="glossary-jump-bar"></div>
        <section id="term-list" class="jig-card-list"></section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig-bundle.js?v={{assetVersion}}"></script>
<script src="./data/navigation-data.js?v={{assetVersion}}"></script>
<script src="./data/summary-data.js?v={{assetVersion}}"></script>
<script src="./data/glossary-data.js?v={{assetVersion}}"></script>
<script src="./assets/glossary.js?v={{assetVersion}}"></script>
</body>
</html>
