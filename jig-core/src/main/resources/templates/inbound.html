<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css?v={{assetVersion}}" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico?v={{assetVersion}}">
    <title data-i18n>入力インタフェース</title>
</head>
<body class="inbound-interface">
<header class="top">
    <a href="./index.html">JIG</a> / <b class="jig-page-title" data-i18n>入力インタフェース</b>
</header>
<div class="split-view">
    <nav id="inbound-sidebar" class="in-page-sidebar in-page-sidebar--tree">
        <div class="sidebar-header">
        <details id="sidebar-settings" class="sidebar-settings">
            <summary>
                <span data-i18n>表示設定</span>
            </summary>
            <div class="sidebar-settings-panel">
                <fieldset id="display-type-fieldset"></fieldset>
            </div>
        </details>
        <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" aria-expanded="true" title="サイドバーを折りたたむ/展開する"></button>
        </div>
        <div class="sidebar-filter">
            <input type="search" id="inbound-sidebar-filter" placeholder="絞り込み" data-i18n-attr="placeholder" autocomplete="off">
        </div>
        <div id="inbound-sidebar-list" class="in-page-sidebar__list"></div>
    </nav>
    <main id="inbound-list" class="jig-card-list">
        <div id="jig-document-description" class="hidden"></div>
        <!-- JavaScriptで描画されます -->
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig-bundle.js?v={{assetVersion}}"></script>
<script src="./data/navigation-data.js?v={{assetVersion}}"></script>
<script src="./data/summary-data.js?v={{assetVersion}}"></script>
<script src="./data/inbound-data.js?v={{assetVersion}}"></script>
<script src="./data/usecase-data.js?v={{assetVersion}}"></script>
<script src="./data/glossary-data.js?v={{assetVersion}}"></script>
<script src="./assets/inbound.js?v={{assetVersion}}"></script>
</body>
</html>
