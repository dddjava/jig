<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>一覧出力</title>
</head>
<body class="list-output">
<header class="top">
    <a href="./index.html">JIG</a> / <b class="jig-page-title">一覧出力</b>
</header>
<main>
    <div class="list-output-tabs">
        <button class="tab-button is-active" type="button" data-tab-group="main" data-tab="business">ビジネスルール一覧</button>
        <button class="tab-button" type="button" data-tab-group="main" data-tab="application">機能一覧</button>
    </div>

    <section id="business-panel" class="list-output-tab is-active" data-tab-group="main" data-tab="business">
        <h2>ビジネスルール一覧</h2>
        <div class="list-output-tabs" role="tablist" aria-label="ビジネスルール一覧の切り替え">
            <button class="tab-button is-active" type="button" data-tab-group="business" data-tab="package">PACKAGE</button>
            <button class="tab-button" type="button" data-tab-group="business" data-tab="all">ALL</button>
            <button class="tab-button" type="button" data-tab-group="business" data-tab="enum">ENUM</button>
            <button class="tab-button" type="button" data-tab-group="business" data-tab="collection">COLLECTION</button>
            <button class="tab-button" type="button" data-tab-group="business" data-tab="validation">VALIDATION</button>
            <button class="tab-button" type="button" data-tab-group="business" data-tab="smell">注意メソッド</button>
        </div>

        <section id="business-package-panel" class="list-output-tab is-active" data-tab-group="business" data-tab="package">
            <h3>PACKAGE</h3>
            <div class="list-output-actions">
                <button id="export-business-package-csv" type="button">CSV出力</button>
            </div>
            <table id="business-package-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="business-all-panel" class="list-output-tab" data-tab-group="business" data-tab="all">
            <h3>ALL</h3>
            <div class="list-output-actions">
                <button id="export-business-all-csv" type="button">CSV出力</button>
            </div>
            <table id="business-all-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="business-enum-panel" class="list-output-tab" data-tab-group="business" data-tab="enum">
            <h3>ENUM</h3>
            <div class="list-output-actions">
                <button id="export-business-enum-csv" type="button">CSV出力</button>
            </div>
            <table id="business-enum-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="business-collection-panel" class="list-output-tab" data-tab-group="business" data-tab="collection">
            <h3>COLLECTION</h3>
            <div class="list-output-actions">
                <button id="export-business-collection-csv" type="button">CSV出力</button>
            </div>
            <table id="business-collection-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="business-validation-panel" class="list-output-tab" data-tab-group="business" data-tab="validation">
            <h3>VALIDATION</h3>
            <div class="list-output-actions">
                <button id="export-business-validation-csv" type="button">CSV出力</button>
            </div>
            <table id="business-validation-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="business-smell-panel" class="list-output-tab" data-tab-group="business" data-tab="smell">
            <h3>注意メソッド</h3>
            <div class="list-output-actions">
                <button id="export-business-smell-csv" type="button">CSV出力</button>
            </div>
            <table id="business-smell-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>
    </section>

    <section id="application-panel" class="list-output-tab" data-tab-group="main" data-tab="application">
        <h2>機能一覧</h2>
        <div class="list-output-tabs" role="tablist" aria-label="機能一覧の切り替え">
            <button class="tab-button is-active" type="button" data-tab-group="application" data-tab="controller">CONTROLLER</button>
            <button class="tab-button" type="button" data-tab-group="application" data-tab="service">SERVICE</button>
            <button class="tab-button" type="button" data-tab-group="application" data-tab="repository">REPOSITORY</button>
        </div>

        <section id="controller-panel" class="list-output-tab is-active" data-tab-group="application" data-tab="controller">
            <h3>CONTROLLER</h3>
            <div class="list-output-actions">
                <button id="export-controller-csv" type="button">CSV出力</button>
            </div>
            <table id="controller-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="service-panel" class="list-output-tab" data-tab-group="application" data-tab="service">
            <h3>SERVICE</h3>
            <div class="list-output-actions">
                <button id="export-service-csv" type="button">CSV出力</button>
            </div>
            <table id="service-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>

        <section id="repository-panel" class="list-output-tab" data-tab-group="application" data-tab="repository">
            <h3>REPOSITORY</h3>
            <div class="list-output-actions">
                <button id="export-repository-csv" type="button">CSV出力</button>
            </div>
            <table id="repository-list" class="zebra">
                <tbody></tbody>
            </table>
        </section>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig-glossary.js"></script>
<script src="./assets/jig-dom.js"></script>
<script src="./data/navigation-data.js"></script>
<script src="./data/glossary-data.js"></script>
<script src="./data/list-output-data.js"></script>
<script src="./assets/list-output.js"></script>
</body>
</html>
