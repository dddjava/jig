<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>出力インタフェース概要</title>
</head>
<body class="outbound">
<header class="top">
    <b>出力インタフェース概要</b>
</header>
<main>
    <div class="outbound-sticky-header">
        <details class="outbound-settings-panel jig-card jig-card--type" open>
            <summary class="outbound-settings-panel__title">表示設定</summary>
            <div class="outbound-visibility-panel" role="group" aria-labelledby="outbound-visibility-panel-title">
                <div class="outbound-visibility-panel__groups">
                    <div class="outbound-visibility-panel__group">
                        <p class="outbound-visibility-panel__group-label">表示要素</p>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-port" checked> ポート</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-operation" checked> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-adapter" checked> アダプタ</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-execution" checked> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-accessor"> 外部アクセサ</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-accessor-method"> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-target" checked> 外部操作対象</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-external-type-method" checked> 操作方法</label>
                        </div>
                    </div>
                    <div class="outbound-visibility-panel__group">
                        <p class="outbound-visibility-panel__group-label">永続化操作方法</p>
                        <label><input type="checkbox" name="show-crud-r" checked> SELECT</label>
                        <label><input type="checkbox" name="show-crud-c" checked> INSERT</label>
                        <label><input type="checkbox" name="show-crud-u" checked> UPDATE</label>
                        <label><input type="checkbox" name="show-crud-d" checked> DELETE</label>
                    </div>
                    <div class="outbound-visibility-panel__group">
                        <p class="outbound-visibility-panel__group-label">ダイアグラムの方向</p>
                        <label><input type="radio" name="diagram-direction" value="LR" checked> 左→右</label>
                        <label><input type="radio" name="diagram-direction" value="TB"> 上→下</label>
                    </div>
                </div>
            </div>
        </details>

        <nav class="outbound-tab-list">
            <button class="tab-button is-active" data-tab="outbound">ポート</button>
            <button class="tab-button" data-tab="persistence">永続化</button>
            <button class="tab-button" data-tab="crud">永続化(CRUD)</button>
            <button class="tab-button" data-tab="external">外部型</button>
        </nav>
    </div>

    <div id="outbound-tab-panel" class="outbound-tab-panel is-active">
        <div class="outbound-view-container">
            <nav id="outbound-port-sidebar" class="outbound-sidebar in-page-sidebar" aria-label="ポートナビゲーション">
                <div id="outbound-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outbound-port-list" class="outbound-group-list" aria-label="ポート"></section>
        </div>
    </div>

    <div id="persistence-tab-panel" class="outbound-tab-panel">
        <div class="outbound-view-container">
            <nav id="outbound-persistence-sidebar" class="outbound-sidebar in-page-sidebar" aria-label="永続化ナビゲーション">
                <div id="persistence-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outbound-persistence-list" class="outbound-group-list" aria-label="永続化"></section>
        </div>
    </div>

    <div id="crud-tab-panel" class="outbound-tab-panel">
        <section id="outbound-crud-panel" class="outbound-crud-panel" aria-label="永続化(CRUD)"></section>
    </div>

    <div id="external-tab-panel" class="outbound-tab-panel">
        <div class="outbound-view-container">
            <nav id="outbound-external-sidebar" class="outbound-sidebar in-page-sidebar" aria-label="外部型ナビゲーション">
                <div id="external-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outbound-external-list" class="outbound-group-list" aria-label="外部型"></section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig.js"></script>
<script src="./data/navigation-data.js"></script>
<script src="./data/outbound-data.js"></script>
<script src="./assets/outbound.js"></script>
</body>
</html>
