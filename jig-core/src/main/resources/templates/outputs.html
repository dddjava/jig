<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>外部利用概要</title>
</head>
<body class="outputs">
<header class="top">
    <a href="./index.html">[INDEX]</a>
    <b>外部利用概要</b>
</header>
<main>
    <aside class="notice">
        <p>注意: このドキュメントはincubate（作成中）です。次のバージョンで大きく変更したり削除したりする可能性があります。</p>
    </aside>

    <div class="outputs-sticky-header">
        <details class="outputs-common-settings" open>
            <summary class="outputs-common-settings__title">表示設定</summary>
            <div class="outputs-display-mode" role="group" aria-labelledby="outputs-display-mode-title">
                <div class="outputs-display-mode__groups">
                    <div class="outputs-display-mode__group">
                        <p class="outputs-display-mode__group-label">表示要素</p>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-port" checked> ポート</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-operation" checked> 操作</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-adapter" checked> アダプター</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-execution" checked> 実行</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-accessor"> アクセッサ</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-accessor-method"> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-target" checked> ターゲット</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-external-type-method"> メソッド</label>
                        </div>
                    </div>
                    <div class="outputs-display-mode__group">
                        <p class="outputs-display-mode__group-label">方向</p>
                        <label><input type="radio" name="diagram-direction" value="LR" checked> 左→右</label>
                        <label><input type="radio" name="diagram-direction" value="TB"> 上→下</label>
                    </div>
                    <div class="outputs-display-mode__group">
                        <p class="outputs-display-mode__group-label">CRUD</p>
                        <label><input type="checkbox" name="show-crud-c" checked> C</label>
                        <label><input type="checkbox" name="show-crud-r" checked> R</label>
                        <label><input type="checkbox" name="show-crud-u" checked> U</label>
                        <label><input type="checkbox" name="show-crud-d" checked> D</label>
                    </div>
                </div>
            </div>
        </details>

        <nav class="outputs-tabs">
            <button class="tab-button is-active" data-tab="outputs">出力ポート一覧</button>
            <button class="tab-button" data-tab="persistence">永続化操作一覧</button>
            <button class="tab-button" data-tab="crud">CRUD表</button>
            <button class="tab-button" data-tab="external">外部操作一覧</button>
        </nav>
    </div>

    <div id="outputs-tab-panel" class="outputs-tab-panel is-active">
        <div class="outputs-container">
            <nav id="outputs-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="出力ポート一覧ナビゲーション">
                <div id="outputs-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outputs-list" class="outputs-list" aria-label="出力ポート一覧"></section>
        </div>
    </div>

    <div id="persistence-tab-panel" class="outputs-tab-panel">
        <div class="outputs-container">
            <nav id="persistence-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="永続化操作一覧ナビゲーション">
                <div id="persistence-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="persistence-list" class="outputs-list" aria-label="永続化操作一覧"></section>
        </div>
    </div>

    <div id="crud-tab-panel" class="outputs-tab-panel">
        <section id="outputs-crud" class="outputs-crud" aria-label="永続化操作対象CRUD表"></section>
    </div>

    <div id="external-tab-panel" class="outputs-tab-panel">
        <div class="outputs-container">
            <nav id="external-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="外部操作一覧ナビゲーション">
                <div id="external-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="external-list" class="outputs-list" aria-label="外部操作一覧"></section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig.js"></script>
<script src="./data/outputs-data.js"></script>
<script src="./assets/outputs.js"></script>
</body>
</html>
