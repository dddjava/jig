<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>外部利用概要</title>
</head>
<body class="outputs">
<header class="top">
    <a href="./index.html">[INDEX]</a>
    <b>外部利用概要</b>
</header>
<main>
    <aside class="notice">
        <p>注意: このドキュメントはincubate（作成中）です。次のバージョンで大きく変更したり削除したりする可能性があります。</p>
    </aside>

    <div class="outputs-sticky-header">
        <details class="outputs-settings-panel jig-card jig-card--type" open>
            <summary class="outputs-settings-panel__title">表示設定</summary>
            <div class="outputs-visibility-panel" role="group" aria-labelledby="outputs-visibility-panel-title">
                <div class="outputs-visibility-panel__groups">
                    <div class="outputs-visibility-panel__group">
                        <p class="outputs-visibility-panel__group-label">表示要素</p>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-port" checked> ポート</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-operation" checked> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-adapter" checked> アダプタ</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-execution" checked> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-accessor"> 外部アクセサ</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-accessor-method"> メソッド</label>
                        </div>
                        <div class="checkbox-pair">
                            <label><input type="checkbox" name="show-target" checked> 外部操作対象</label>
                            <label class="checkbox-child"><input type="checkbox" name="show-external-type-method" checked> 操作方法</label>
                        </div>
                    </div>
                    <div class="outputs-visibility-panel__group">
                        <p class="outputs-visibility-panel__group-label">永続化操作方法</p>
                        <label><input type="checkbox" name="show-crud-r" checked> SELECT</label>
                        <label><input type="checkbox" name="show-crud-c" checked> INSERT</label>
                        <label><input type="checkbox" name="show-crud-u" checked> UPDATE</label>
                        <label><input type="checkbox" name="show-crud-d" checked> DELETE</label>
                    </div>
                    <div class="outputs-visibility-panel__group">
                        <p class="outputs-visibility-panel__group-label">ダイアグラムの方向</p>
                        <label><input type="radio" name="diagram-direction" value="LR" checked> 左→右</label>
                        <label><input type="radio" name="diagram-direction" value="TB"> 上→下</label>
                    </div>
                </div>
            </div>
        </details>

        <nav class="outputs-tab-list">
            <button class="tab-button is-active" data-tab="outputs">ポート</button>
            <button class="tab-button" data-tab="persistence">永続化</button>
            <button class="tab-button" data-tab="crud">永続化(CRUD)</button>
            <button class="tab-button" data-tab="external">外部型</button>
        </nav>
    </div>

    <div id="outputs-tab-panel" class="outputs-tab-panel is-active">
        <div class="outputs-view-container">
            <nav id="outputs-port-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="ポートナビゲーション">
                <div id="outputs-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outputs-port-list" class="outputs-group-list" aria-label="ポート"></section>
        </div>
    </div>

    <div id="persistence-tab-panel" class="outputs-tab-panel">
        <div class="outputs-view-container">
            <nav id="outputs-persistence-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="永続化ナビゲーション">
                <div id="persistence-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outputs-persistence-list" class="outputs-group-list" aria-label="永続化"></section>
        </div>
    </div>

    <div id="crud-tab-panel" class="outputs-tab-panel">
        <section id="outputs-crud-panel" class="outputs-crud-panel" aria-label="永続化(CRUD)"></section>
    </div>

    <div id="external-tab-panel" class="outputs-tab-panel">
        <div class="outputs-view-container">
            <nav id="outputs-external-sidebar" class="outputs-sidebar in-page-sidebar" aria-label="外部型ナビゲーション">
                <div id="external-sidebar-list" class="in-page-sidebar__list"></div>
            </nav>
            <section id="outputs-external-list" class="outputs-group-list" aria-label="外部型"></section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig.js"></script>
<script src="./data/outputs-data.js"></script>
<script src="./assets/outputs.js"></script>
</body>
</html>
