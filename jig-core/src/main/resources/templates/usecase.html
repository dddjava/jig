<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/style.css" rel="stylesheet">
    <link rel="icon" href="./assets/favicon.ico">
    <title>ユースケース概要</title>
</head>
<body class="usecase-summary">
<header class="top">
    <a href="./index.html">JIG</a> / <b>ユースケース概要</b>
</header>
<div class="split-view">
    <nav id="usecase-sidebar" class="tree in-page-sidebar in-page-sidebar--tree" aria-label="パッケージツリー">
        <div id="usecase-sidebar-list" class="in-page-sidebar__list"></div>
    </nav>

    <main class="usecase">
        <details class="controls">
            <summary>⚙️ 表示設定</summary>
            <div class="filter-controls">
                <label><input type="checkbox" id="show-fields" checked> フィールド</label>
                <label><input type="checkbox" id="show-static-methods" checked> staticメソッド</label>
                <label><input type="checkbox" id="show-diagrams" checked> ダイアグラム</label>
                <label><input type="checkbox" id="show-details" checked> 引数・戻り値</label>
                <label><input type="checkbox" id="show-descriptions" checked> 説明</label>
                <label><input type="checkbox" id="show-declarations" checked> 完全修飾名・宣言</label>
            </div>
        </details>
        <div id="usecase-list" class="jig-card-list">
            <!-- JavaScriptで描画されます -->
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js"></script>
<script src="./assets/jig.js"></script>
<script src="./data/navigation-data.js"></script>
<script src="./data/usecase-data.js"></script>
<script src="./assets/usecase.js"></script>
</body>
</html>
